include:
  - ./docker/postgres/docker-compose.yml
  - ./docker/minio/docker-compose.yml
  - ./docker/redis/docker-compose.yml

services:
  backend:
    image: nalumv2-backend:local
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    # Local development starts from a clean schema and reapplies migrations.
    command: ["bun", "src/scripts/start.ts", "--migrate=reset"]
    env_file:
      - ./apps/backend/.env
    environment:
      # Keep the runtime mode owned by the root Compose environment, rather
      # than the app-specific env file.
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-nalum-uploads}
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5000:5000"
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatserver:
    build:
      context: .
      dockerfile: docker/chatserver.Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CHAT_PORT: 3001
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  email-worker:
    image: nalumv2-backend:local
    command: ["bun", "run", "email:worker"]
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-nalum-uploads}
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    profiles: ["production"]
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - chatserver

  certbot:
    image: certbot/certbot:latest
    profiles: ["production"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot

volumes:
  letsencrypt:
  certbot-webroot:
