services:
  redis:
    image: redis:7-alpine
    container_name: nalum-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: nalum-redisinsight
    restart: unless-stopped
    profiles: ["development"]

    ports:
      - "5540:5540"

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - redisinsight-data:/data

volumes:
  redis-data:
  redisinsight-data:
