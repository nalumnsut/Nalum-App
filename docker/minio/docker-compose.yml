services:
  minio:
    image: minio/minio:latest
    container_name: nalum-minio
    restart: unless-stopped

    command: ["server", "/data", "--console-address", ":9001"]

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}

    expose:
      - "9000"
      - "9001"

    ports:
      - "9000:9000"

    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO's console remains private to the Compose network by default. This
  # development-only proxy makes it available on localhost:9001.
  minio-console:
    image: nginx:1.27-alpine
    container_name: nalum-minio-console
    restart: unless-stopped
    profiles: ["development"]

    ports:
      - "9001:9001"

    volumes:
      - ../../nginx/minio-console.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      minio:
        condition: service_healthy

volumes:
  minio-data:
